<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>皮肤详情 - 皮肤库</title>
	<link rel="shortcut icon" href="assets/icon/favicon.svg" type="image/x-icon">

	<link rel="stylesheet" href="assets/style/global.css">
	<link rel="stylesheet" href="assets/style/details.css">
</head>

<body>
	<main>
		<div class="header">
			<button class="backBtn" title="返回">
				<svg width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
					<path d="M12.9998 8L6 14L12.9998 21" stroke="#4a90e2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
					<path d="M6 14H28.9938C35.8768 14 41.7221 19.6204 41.9904 26.5C42.2739 33.7696 36.2671 40 28.9938 40H11.9984" stroke="#4a90e2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
				</svg>
			</button>
			<p class="title"></p>
		</div>
		<div class="content">
			<div class="preview">
				<canvas class="skin-3d" width="1500" height="2000" data-theta="-330" data-phi="-1"></canvas>
				<img alt="preview" hidden>
			</div>
			<div class="right">
				<div class="btnBox">
					<button title="播放预览动画" class="play" hidden>
						<img src="assets/icon/play.svg" alt="play" class="playIcon">
						<img src="assets/icon/pause.svg" alt="pause" class="pauseIcon" hidden>
						<span>播放</span>
					</button>
					<button title="下载皮肤原图" class="downloadSkinImg">
						<img src="assets/icon/download_img1.svg" alt="">
						<span>下载皮肤原图</span>
					</button>
					<button title="下载当前预览图" class="downloadViewImg" hidden>
						<img src="assets/icon/download_img2.svg" alt="download_img">
						<span>下载当前预览图</span>
					</button>
					<button title="重命名" class="rename">
						<img src="assets/icon/rename.svg" alt="rename">
						<span>重命名</span>
					</button>
					<button title="切换手臂样式" class="switchArmStyle" hidden>
						<img src="assets/icon/switch.svg" alt="switch">
						<span>切换为<span>...</span></span>
					</button>
					<button title="永久删除" class="theme-red delete">
						<img src="assets/icon/delete.svg" alt="delete">
						<span>删除</span>
					</button>
				</div>
				<ul class="meta">
					<li class="uploadDate">
						<span class="title">上传日期：</span>
						<span class="text">...</span>
					</li>
					<li class="source">
						<span class="title">来源：</span>
						<span class="text">从<span>...</span>添加</span>
					</li>
				</ul>
			</div>
		</div>
	</main>


	<script src="assets/lib/three.min.js"></script>
    <script src="assets/lib/SpawnThumbnail.js"></script>

	<script src="assets/javascript/global.js" type="module"></script>
	<script src="assets/javascript/details.js" type="module"></script>
</body>
</html>
