    <script>
        // import { Popup } from './resource/javascript/Popup.js';

        const API_HOST = 'http://192.168.1.100:3000';

        /**
         * 上传皮肤
         * @param {Upload} data 上传信息
         */
        async function uploadSkin(data) {
            let res = null;
            if (data.file_skin) {
                res = await fetch(API_HOST + '/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                })
            } else {
                res = await fetch(API_HOST + '/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                })
            }
            return(res);
        }

        /**
         * 从本地文件上传皮肤
         * @param {file} file *单个*文件
         * @param {string} name 皮肤名称
         * @param {string} type 皮肤分类
         * @param {boolean} slim 是否为纤细
         */
        async function uploadSkinByFile(file, name, type, slim) {
            // 校验
            if (!file || !name) return;

            // 获取文件的base64
            let reader = new FileReader();
            reader.readAsDataURL(file);
            await new Promise((resolve) => {
                reader.onload = resolve;
            });
            reader = reader.result;

            // 判断图片是标准皮肤还是其他图片
            const image = new Image();
            image.src = reader;
            await new Promise((resolve) => {
                image.onload = resolve;
            });

            if (image.width + image.height > 5000) {
                Popup.info(`(${name}) 图像尺寸过大`, 3, 0);
                return;
            }
            if (image.width === image.height && image.width + image.width === 128) { // 标准皮肤
                // 获取皮肤预览图
                const viewBase64 = await spawn(reader, document.querySelector('#thumbnailSpawn'), slim);

                let skinBase64_noPrefix = reader.split(',')[1];
                let viewBase64_noPrefix = viewBase64.split(',')[1];
                let data = await uploadSkin({
                    name: name || removeFileExtensionUtil(file.name), // 皮肤名
                    slim: slim, // 是否为纤细
                    type: type, // 皮肤分类
                    from: '本地文件上传', // 来源
                    file_skin: { // 皮肤源文件
                        name: file.name, // 皮肤文件名
                        editTime: file.lastModified, // 最后修改时间
                        base64Data: skinBase64_noPrefix, // base64数据(不包含data前缀)
                        md5: CryptoJS.MD5(skinBase64_noPrefix).toString() // 文件md5
                    },
                    file_view: { // 皮肤预览图
                        base64Data: viewBase64_noPrefix // base64数据(不包含data前缀)
                    }
                });
                data = await data.json();
                if (data.code !== 200) {
                    if (data.code === 400 && data.data.message) Popup.info('请求失败: ' + data.data.message);
                    else Popup.info(`(${name}) 请求失败，后端返回错误：${data.message}`);
                    return;
                }
            } else { // 其他图片
                let data = await uploadSkin({
                    name: name || removeFileExtensionUtil(file.name),
                    type: type,
                    from: '本地文件上传',
                    file_view: {
                        base64Data: reader.split(',')[1]
                    }
                });
                data = await data.json();
                if (data.code !== 200) {
                    if (data.code === 400 && data.data.message) Popup.info('请求失败: ' + data.data.message);
                    else Popup.info(`(${name}) 请求失败，后端返回错误：${data.message}`);
                    return;
                }
            };
        }

        // 筛选模块
        const Filter = {
            types: ['全部'], // 所有的皮肤分类

            /** 内部方法，用于根据现有条件进行搜索 */
            search: () => {
                let items1 = document.querySelectorAll('#ItemBox li'); // 所有符合条件的项目，在筛选时动态添加和删除
                let items2 = []; // 这两个items来回导，第一轮吧items1中符合条件的放到items2中，
                                 // 第二轮先清空items1然后从items2中筛选再把符合条件的放到items1中，以此类推

                // 第一轮筛选
                items1.forEach((value, key) => {
                    let temp = trimAll(value.querySelector('p').innerText); // 项目的标题
                    let temp2 = trimAll(Filter.nowSearchValue); // 用户输入的内容
                    if (temp === '') value.style.display = 'block';
                    else if (temp.includes(temp2)) {
                        value.style.display = 'block';
                        items2.push(value);
                    } else value.style.display = 'none';
                });

                // 第二轮筛选
                items1 = [];
                items2.forEach(index => {
                    if (index.getAttribute('type') !== void 0) {
                        if (Filter.nowTypeIndex === 0) index.style.display = 'block';
                        else if (index.getAttribute('type') === Filter.types[Filter.nowTypeIndex]) index.style.display = 'block';
                        else index.style.display = 'none';
                    }
                });
            }
        }
        Object.defineProperties(Filter, {
            nowSearchValue: { // 当前搜索值
                get: () => {
                    return this.nowSearchValue;
                },
                set: (value) => {
                    this.nowSearchValue = value;
                    Filter.search();
                }
            },
            nowTypeIndex: { // 当前类型在types中的索引 // 当前分类处于ul中的索引，默认0(全部)
                get: () => {
                    return this.nowTypeIndex;
                },
                set: (value) => {
                    this.nowTypeIndex = value;
                    Filter.search();
                }
            }
        })
        // 初始化
        Filter.nowSearchValue = '';
        Filter.nowTypeIndex = 0;

        /**
         * 添加到上传层
         * @param {string} name 皮肤名
         */
        function addToUploadLayer(name) {
            let tr = document.createElement('tr');
            let td1 = document.createElement('td'); // 皮肤名
            let td2 = document.createElement('td'); // 分类
            let td3 = document.createElement('td'); // 纤细?
            let td4 = document.createElement('td'); // 状态
            let td5 = document.createElement('td'); // (操作)

            // 皮肤名
            td1.innerHTML = `<input type="text" placeholder="皮肤名不可为空" value="${removeFileExtensionUtil(name)}">`;

            // 分类
            td2.innerHTML = `<input type="text" placeholder="可空">`;

            // 纤细?
            td3.innerHTML = '是纤细的：<input type="checkbox">';

            // 状态
            td4.classList = ['waiting'];

            let temp = i;
            // 点击预览
            tr.addEventListener('click', () => {
                if (UploadList.length === 0) return; // 防止最后的删除和预览一起触发

                i = temp; // 用于修复i在添加监听器里面变成for的最后一个元素的奇怪问题
                document.querySelector('#UploadLayer .content .preview p').style.display = 'none';
                const el = document.querySelector('#UploadLayer .content .preview img');
                el.style.display = 'block';

                const reader = new FileReader();
                reader.onload = (e) => {
                    el.src = e.target.result;
                };
                reader.readAsDataURL(i);
            });

            // 操作
            td5.innerHTML = '<svg title="取消" width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 14L34 34" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 34L34 14" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>'
            td5.addEventListener('click', e => {
                UploadList = UploadList.filter(item => item != i);
                e.currentTarget.parentElement.remove();
                if (UploadList.length === 0) {
                    const el = document.querySelector('#UploadLayer .content .preview');
                    el.querySelector('img').src = '';
                    el.querySelector('img').style.display = 'none';
                    el.querySelector('p').style.display = 'block';
                }
            });

            // 显示
            tr.appendChild(td1);
            tr.appendChild(td2);
            tr.appendChild(td3);
            tr.appendChild(td4);
            tr.appendChild(td5);
            document.querySelector('#UploadLayer .content tbody').appendChild(tr);
        }

        let UploadList = [];
        // 页面加载
        async function _onload() {
            let data = null;
            try {
                data = await fetch(API_HOST + '/get');
            } catch(e) {
                Popup.info('无法连接至后端服务器，功能不可用', 3, 0);
                return;
            }
            data = await data.json();
            for (let i = 0; i < data.skins.length; i++) {
                let temp = document.createElement('li');
                temp.classList.add('item');
                temp.innerHTML = `
                    <p title="${data.skins[i].name}">${data.skins[i].name}</p>
                    <img src="data:image/png;base64,${data.skins[i].file_view.base64Data}" alt="${data.skins[i].name}">
                `;
                temp.setAttribute('skin-id', data.skins[i].id);
                if (data.skins[i].type !== '') {
                    temp.setAttribute('type', data.skins[i].type);
                    let find = false;
                    for (let ii = 0; ii < Filter.types.length; ii++) {
                        if (Filter.types[ii] === data.skins[i].type) find = true;
                    }
                    if (!find) Filter.types.push(data.skins[i].type);
                }
                temp.addEventListener('click', e => {
                    window.location.href = `./details.html?id=${e.currentTarget.getAttribute('skin-id')}`;
                })

                // 右键菜单
                temp.addEventListener('contextmenu', e => {
                    let m = document.querySelector('#menu p');
                    menu.data.name = data.skins[i].name;
                    menu.data.id = data.skins[i].id;
                    menu.data.slim = data.skins[i].slim;
                    menu.data.isSkin = data.skins[i].file_skin || false; // 是否为标准皮肤，而不是一张图片
                    m.innerText = m.title = menu.data.name;

                    // 下载皮肤原图
                    if (menu.data.isSkin) {
                        document.querySelector('#menu ul li.downloadSkinImg').style.display = 'flex';
                    } else {
                        document.querySelector('#menu ul li.downloadSkinImg').style.display = 'none';
                    }
                    // 切换为...
                    if (menu.data.slim !== void 0) {
                        document.querySelector('#menu ul li.switchArmStyle').style.display = 'flex';
                        document.querySelector('#menu ul li.switchArmStyle span:last-child').innerText = menu.data.slim ? '切换为经典' : '切换为纤细';
                    } else {
                        document.querySelector('#menu ul li.switchArmStyle').style.display = 'none';
                    }
                    menu.open(e);
                });

                ItemBox.appendChild(temp);
            }
            // 搜索
            document.querySelector('.Filter .search input').addEventListener('input', e => {
                Filter.nowSearchValue = e.currentTarget.value;
            })
            // 分类，遍历 & 绑事件
            for (let i = 0; i < Filter.types.length; i++) {
                let temp = document.createElement('li');
                temp.innerText = Filter.types[i];
                temp.addEventListener('click', () => {
                    Filter.nowTypeIndex = i;
                    document.querySelector('.Filter .type ul li.sel').classList.remove('sel');
                    document.querySelectorAll('.Filter .type ul li')[Filter.nowTypeIndex].classList.add('sel');
                })
                if (i === 0) temp.classList.add('sel'); // 给全部加上选中样式
                document.querySelector('.Filter .type ul').appendChild(temp);
            }

            // 右键菜单
            window.addEventListener('click', () => { menu.close() });

            // 菜单项，复制皮肤名
            document.querySelector('#menu ul li.copySkinname').addEventListener('click', e => {
                navigator.clipboard.writeText(e.target.parentElement.parentElement.parentElement.querySelector('p').innerText);
            });
            // 菜单项，下载原图
            document.querySelector('#menu ul li.downloadSkinImg').addEventListener('click', e => {
                downloadImgUseBase64()
            });
            // 菜单项，下载预览图
            document.querySelector('#menu ul li.downloadViewImg').addEventListener('click', e => {
                downloadImgUseBase64()
            });
            // 菜单项，重命名
            document.querySelector('#menu ul li.rename').addEventListener('click', e => {
                const newName = prompt(`为 ${menu.data.name} 重命名: `);
                if (!newName) return;
                fetch(API_HOST + '/renameById?id=' + menu.data.id, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: `{"newName": "${newName}"}`
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.code !== 200) alert('重命名失败，后端返回错误信息: ' + data.message);
                        else window.location.reload();
                    })
            });
            // 菜单项，切换手臂(经典/纤细)
            document.querySelector('#menu ul li.switchArmStyle').addEventListener('click', e => {
                fetch(API_HOST + '/switchArmStyle?id=' + menu.data.id, { method: 'PUT' })
                .then(response => response.json())
                .then(res => {
                    if (res.code !== 200) alert('切换失败，后端返回错误信息: ' + res.message);
                    else window.location.reload();
                })
            })
            // 菜单项，删除
            document.querySelector('#menu ul li.delete').addEventListener('click', async e => {
                if (!await Popup.confirm('确认删除', `将要删除 ${menu.data.name}(${menu.data.id})`)) return;
                fetch(API_HOST + '/deleteSkinById?id=' + menu.data.id, { method: 'DELETE' })
                    .then(response => response.json())
                    .then(data => {
                        if (data.code !== 200) alert('删除失败，后端返回错误信息: ' + data.message);
                        else window.location.reload();
                    })
            });

            // 上传窗口相关，开始上传
            document.querySelector('#UploadLayer .btnGroup .upload').addEventListener('click', async e => {
                const list = document.querySelectorAll('#UploadLayer table tbody tr');
                for (let i = 0; i < UploadList.length; i++) {
                    // waiting -> ready(暂无任何地方使用) -> uploading -> finish | falid(暂无任何地方使用)
                    list[i].querySelector('td:nth-child(4)').classList = ['uploading'];
                    await uploadSkinByFile(
                        UploadList[i],
                        list[i].querySelector('td:nth-child(1) input').value,
                        list[i].querySelector('td:nth-child(2) input').value,
                        list[i].querySelector('td:nth-child(3) input').checked,
                    );
                    list[i].querySelector('td:nth-child(4)').classList = ['finish'];
                }
                window.location.reload();
            });
            // 上传窗口相关，继续添加
            document.querySelector('#UploadLayer .btnGroup .add').addEventListener('click', e => {
                document.querySelector('header .btnGroup .addFromFile input').click();
            });
            // 上传窗口相关，取消上传
            document.querySelector('#UploadLayer .btnGroup .close').addEventListener('click', async e => {
                if (await Popup.confirm('取消上传', '取消后，表单内容将会丢失!')) {
                    UploadList = [];
                    document.getElementById('UploadLayer').classList = [];
                    document.querySelector('#UploadLayer table tbody').remove();
                    document.querySelector('#UploadLayer table').appendChild(document.createElement('tbody'));
                }
            });
            // 从支持的网址上传
            document.querySelector('header .btnGroup .addFromLink').addEventListener('click', async e => {
                const inputUrl = prompt('输入支持的网址，留空则为取消\n支持的站点：\n1. www.namemc.com');
                if (!inputUrl) return;

                // 获取皮肤base64
                let data = await fetch(API_HOST + '/getSkinMetaFromUrl?url=' + inputUrl);
                data = await data.json();
                if (data.code !== 200) {
                    if (data.code === 400 && data.data.message) alert('请求失败: ' + data.data.message);
                    else alert('请求失败，后端返回错误: ' + data.message);
                    return;
                }

                // 准备元信息
                const inputSkinName = prompt(`为 ${data.data.name} 设置皮肤名，输入"#s"跳过该文件`, removeFileExtensionUtil(data.data.name));
                if (inputSkinName === '#s') return;
                const isSlim = await Popup.confirm('纤细?', `皮肤 ${inputSkinName} 是否为纤细?`);
                const inputSkinType = prompt(`为 ${inputSkinName} 设置分类(留空则为无)`);

                // 皮肤预览图
                let viewBase64 = await spawn(data.data.skinBase64, document.querySelector('#thumbnailSpawn'), isSlim);

                // 上传
                data = await uploadSkin({
                    name: inputSkinName || removeFileExtensionUtil(data.data.name), // 皮肤名
                    slim: isSlim, // 是否为纤细
                    type: inputSkinType, // 皮肤分类
                    from: '从 namemc.com 添加', // 来源
                    fromMeta: inputUrl, // 来源相关信息
                    file_skin: { // 皮肤源文件
                        name: null, // 皮肤文件名
                        editTime: null, // 最后修改时间
                        base64Data: data.data.skinBase64, // base64数据(不包含data前缀)
                        md5: CryptoJS.MD5(data.data.skinBase64).toString() // 文件md5
                    },
                    file_view: { // 皮肤预览图
                        base64Data: viewBase64.split(',')[1] // base64数据(不包含data前缀)
                    }
                });
                data = await data.json();
                if (data.code !== 200) {
                    if (data.code === 400 && data.data.message) Popup.info('请求失败: ' + data.data.message);
                    else Popup.info(`(${name}) 请求失败，后端返回错误：${data.message}`);
                    return;
                }
                window.location.reload();
            });
            // 从玩家名上传
            document.querySelector('header .btnGroup .addFromPlayername').addEventListener('click', async e => {
                alert('此功能已开摆'); // 直接开摆
                return;

                const inputPlayername = prompt('输入正版玩家名，留空则为取消');
                if (!inputPlayername) return;

                // TODO 功能未完成，接下来需要将后端返回的url变为base64，然后使用上传方法上传
                let res = await fetch(API_HOST + '/getSkinMetaByPlayername?playername=' + inputPlayername);
                res = res.json();
                if (res.code !== 200) alert('获取失败，后端返回错误信息: ' + res.message);

                // // 获取
                // res = await fetch(response.data.url);
                // // 获取文件的base64
                // let reader = new FileReader();
                // reader.readAsDataURL(i);
                // await new Promise((resolve) => {
                //     reader.onload = resolve;
                // });
                // reader = reader.result;

                // let img = new Image();
                // img.src = data.data.skinUrl;
                // img.onload = () => {
                //     let canvas = document.createElement("canvas");
                //     let ctx = canvas.getContext("2d");
                //     ctx.drawImage(img, 0, 0);
                //     uploadSkin([temp]);
                // }

                // new Image()
            });
            // 从本地文件上传
            document.querySelector('header .btnGroup .addFromFile input').addEventListener('change', e => {
                document.getElementById('UploadLayer').classList = ['open'];
                for (i of e.target.files) {
                    addToUploadLayer(i.name);
                    UploadList.push(i);
                }
            });
            document.querySelector('header .btnGroup .addFromFile').addEventListener('click', e => {
                document.querySelector('header .btnGroup .addFromFile input').click();
            });
            // 拖放上传
            document.body.ondragenter = e => {
                e.preventDefault();
                mask.classList.add('show');
            }
            mask.ondragenter = e => {
                e.preventDefault();
            }
            mask.ondragleave = e => {
                e.preventDefault();
                mask.classList.remove('show');
            }
            mask.ondragover = e => {
                e.preventDefault();
            }
            mask.ondrop = e => {
                e.preventDefault();
                if (e.dataTransfer.types.length !== 1 || e.dataTransfer.types[0] !== 'Files') {
                    Popup.info('文件无效', 3, 3);
                    mask.classList.remove('show');
                    return;
                }
                mask.querySelector('p').innerText = '添加中...';

                // 开始上传
                document.getElementById('UploadLayer').classList.add('open');
                for (i of e.dataTransfer.files) {
                    UploadList.push(i);
                    addToUploadLayer(i.name);
                }
                mask.classList.remove('show');
                mask.querySelector('p').innerText = '在此处放开以上传';
            }
        }
        window.addEventListener('load', _onload());
    </script>
</body>
