name: Build and Publish Docker Image on Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image owner and name
        id: meta
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image_name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/${{ steps.meta.outputs.image_name }}:${{ github.event.release.tag_name }}
            ${{ !github.event.release.prerelease && format('ghcr.io/{0}/{1}:latest', steps.meta.outputs.owner_lc, steps.meta.outputs.image_name) || '' }}
